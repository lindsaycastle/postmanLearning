$kind: http-request
url: "{{baseUrl}}/status"
method: GET
scripts:
  - type: beforeRequest
    code: "\r\n"
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test('Status is up', () => {\r

      \    const response = pm.response.json();\r

      \    pm.expect(response.status).to.eql('UP');\r

      })\r

      \r

      const name = 'Jake';\r

      \r

      pm.collectionVariables.set('firstname', name);\r

      //console.log(response.status)"
    language: text/javascript
order: 1000
