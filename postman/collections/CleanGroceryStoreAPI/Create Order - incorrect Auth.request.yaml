$kind: http-request
url: "{{baseUrl}}/orders"
method: POST
body:
  type: json
  content: "{\r

    \    \"cartId\": \"{{cartId}}\",\r

    \    \"customerName\": \"{{$randomFullName}}\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{auth_secret_15tb}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 401\", function () {\r

      \    pm.response.to.have.status(401);\r

      });\r

      \r

      pm.test(\"Error message\", () => {\r

      \    const response = pm.response.json();\r

      \    pm.expect(response.error).to.eql(\"Invalid bearer token.\");\r

      })"
    language: text/javascript
order: 20000
