$kind: http-request
url: "{{baseUrl}}/carts"
method: POST
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 201\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      const response = pm.response.json();\r

      \r

      pm.test(\"Cart created successfully\", () => {\r

      \r

      \    pm.expect(response).to.be.an('object');\r

      \    pm.expect(response).to.haveOwnProperty(\"created\");\r

      \    pm.expect(response.created).to.be.true;\r

      \    pm.expect(response).to.haveOwnProperty(\"cartId\");\r

      \    pm.expect(response.cartId).to.be.a('string');\r

      \r

      \    const cartId = response.cartId;\r

      \r

      \    pm.collectionVariables.set(\"cartId\", cartId);\r

      });"
    language: text/javascript
order: 5000
