$kind: http-request
url: "{{baseUrl}}/orders/:orderId"
method: PATCH
headers:
  Authorization: Bearer:{{vault:groc_ath}}
pathVariables:
  orderId: "{{orderId}}"
body:
  type: json
  content: "{\r

    \ \"comment\": \"I like turtles\"\r

    }"
